<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignalCo Master Control | Dave-Co Suite</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-base: #000000;
            --bg-panel: #0b0b0b;
            --bg-raised: #1a1a1a;
            --line-strong: rgba(255, 255, 255, 0.1);
            --marker: #8b55d6;
        }
        body { background-color: var(--bg-base); color: #e2e8f0; }
        .panel { background-color: var(--bg-panel); border: 1px solid var(--line-strong); }
        .panel-raised { background-color: var(--bg-raised); border: 1px solid var(--line-strong); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        .message-urgent {
            background-color: rgba(153, 27, 27, 0.2) !important; 
            border-color: rgba(239, 68, 68, 0.5) !important;
            color: #fca5a5 !important; 
        }
    </style>
</head>
<body id="app" class="h-screen flex flex-col font-sans overflow-hidden">

    <!-- HEADER -->
    <header class="panel border-b px-8 py-4 flex justify-between items-center z-10 shadow-lg">
        <div class="flex items-center gap-4">
            <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_10px_#10b981]"></div>
            <h1 class="text-2xl font-black tracking-widest uppercase">
                <span class="text-white">Signal</span><span style="color: var(--marker);">Co</span> // Master Control
            </h1>
        </div>
        <div class="text-xs font-mono text-slate-500 bg-black px-4 py-2 rounded border border-white/10">
            ENV: PRODUCTION | CLOUD DB SYNC ACTIVE
        </div>
    </header>

    <!-- MAIN GRID -->
    <main class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 p-6 overflow-hidden">
        
        <!-- LEFT COLUMN: CONTROLS (Spans 5 cols) -->
        <div class="lg:col-span-5 flex flex-col gap-6 overflow-y-auto pr-2 pb-10">
            
            <!-- MASTER SIGNALS -->
            <section class="panel-raised p-6 rounded-xl shadow-xl">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 border-b border-white/10 pb-2">Global Show Cues</h2>
                <div class="grid grid-cols-3 gap-3">
                    <button @click="setMasterSignal('clear')" :class="config.master_signal === 'clear' ? 'bg-slate-600 text-white ring-1 ring-slate-400' : 'bg-black border border-white/10 hover:bg-slate-800 text-slate-400'" class="py-4 rounded font-black tracking-wider text-sm transition-all">
                        CLEAR
                    </button>
                    <button @click="setMasterSignal('standby')" :class="config.master_signal === 'standby' ? 'bg-yellow-600 text-white ring-1 ring-yellow-400 animate-pulse' : 'bg-black border border-white/10 hover:bg-yellow-900/30 text-yellow-500'" class="py-4 rounded font-black tracking-wider text-sm transition-all">
                        STANDBY
                    </button>
                    <button @click="setMasterSignal('go')" :class="config.master_signal === 'go' ? 'bg-emerald-600 text-white ring-1 ring-emerald-400 shadow-[0_0_15px_rgba(16,185,129,0.3)]' : 'bg-black border border-white/10 hover:bg-emerald-900/30 text-emerald-500'" class="py-4 rounded font-black tracking-wider text-sm transition-all">
                        SHOW GO
                    </button>
                </div>
            </section>

            <!-- ENDPOINT MANAGEMENT -->
            <section class="panel-raised p-6 rounded-xl shadow-xl flex-1 flex flex-col min-h-[300px]">
                <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Active Endpoints</h2>
                    <button @click="addTerminal" style="background-color: var(--marker);" class="text-xs text-white font-bold py-1 px-3 rounded hover:opacity-80 transition-opacity">
                        + Add Terminal
                    </button>
                </div>
                
                <div class="space-y-3 overflow-y-auto flex-1 pr-2">
                    <div v-for="(name, id) in config.terminals" :key="id" class="flex items-center gap-3 bg-black p-3 rounded border border-white/5">
                        <div class="bg-slate-800 text-xs font-mono px-2 py-1 rounded text-slate-400 border border-white/10">?t={{ id }}</div>
                        <input type="text" v-model="config.terminals[id]" @input="updateConfig" placeholder="Endpoint Name"
                               class="flex-1 bg-transparent border-b border-slate-700 px-2 py-1 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                        <button @click="removeTerminal(id)" class="text-red-500 hover:text-red-400 hover:bg-red-950 px-2 py-1 rounded transition-colors" title="Delete">✕</button>
                    </div>
                    
                    <div v-if="!config.terminals || Object.keys(config.terminals).length === 0" class="text-slate-600 text-center py-8 font-mono text-xs">
                        NO ENDPOINTS CONFIGURED
                    </div>
                </div>
            </section>

            <!-- CHAOS CONTROLS -->
            <section class="panel-raised p-6 rounded-xl shadow-xl border-t-2 border-t-red-900/50">
                <h2 class="text-sm font-bold text-red-500/70 uppercase tracking-widest mb-4 border-b border-red-900/30 pb-2">Override & Atmosphere</h2>
                <div class="space-y-3">
                    <label class="flex items-center justify-between cursor-pointer p-3 bg-black rounded border border-white/5 hover:border-orange-500/50 transition-colors">
                        <div>
                            <span class="font-bold text-orange-400 text-sm">Breathe Red</span>
                            <span class="text-[10px] text-slate-500 block uppercase font-mono mt-0.5">Global vignette pulse</span>
                        </div>
                        <input type="checkbox" v-model="config.breathe_red" @change="updateConfig" class="w-5 h-5 accent-orange-600">
                    </label>
                    
                    <label class="flex items-center justify-between cursor-pointer p-3 bg-red-950/30 rounded border border-red-900 hover:border-red-500 transition-colors">
                        <span class="font-black text-red-500 text-sm tracking-widest uppercase">Evacuation Strobe</span>
                        <input type="checkbox" v-model="config.force_flash" @change="updateConfig" class="w-5 h-5 accent-red-600">
                    </label>
                </div>
            </section>
        </div>

        <!-- RIGHT COLUMN: MASTER CHAT (Spans 7 cols) -->
        <div class="lg:col-span-7 panel-raised rounded-xl shadow-xl flex flex-col overflow-hidden h-full">
            
            <div class="bg-black/50 px-6 py-3 border-b border-white/10 flex justify-between items-center">
                <h2 class="text-sm font-bold text-slate-300 uppercase tracking-widest flex items-center gap-2">
                    <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"></path></svg>
                    Master Comms Matrix
                </h2>
                <button @click="clearMessages" class="text-[10px] font-mono text-red-500 hover:text-red-400 uppercase tracking-wider bg-red-950/30 px-2 py-1 rounded border border-red-900/50 transition-colors">
                    Wipe History
                </button>
            </div>

            <!-- CHAT FEED -->
            <div class="flex-1 overflow-y-auto p-6 space-y-4 bg-[#050505]" id="chatContainer">
                <div v-for="msg in messages" :key="msg.id" class="flex flex-col max-w-[85%]" :class="msg.sender === adminName ? 'ml-auto items-end' : 'items-start'">
                    
                    <div class="flex items-center gap-2 mb-1" :class="msg.sender === adminName ? 'flex-row-reverse' : ''">
                        <span class="text-[10px] font-mono tracking-wider" :class="msg.sender === adminName ? 'text-blue-400' : 'text-slate-500'">{{ msg.sender }}</span>
                        <span v-if="msg.urgent" class="text-[9px] uppercase font-black tracking-widest text-red-500 bg-red-950/50 px-1.5 py-0.5 rounded border border-red-900">Priority</span>
                    </div>
                    
                    <div class="p-3 rounded-lg text-sm border shadow-sm"
                         :class="[
                             msg.urgent ? 'message-urgent' : 
                             (msg.sender === adminName ? 'bg-blue-900/20 border-blue-800 text-blue-100 rounded-tr-none' : 'bg-[#111] border-white/10 text-slate-300 rounded-tl-none')
                         ]">
                        {{ msg.text }}
                    </div>
                </div>

                <div v-if="messages.length === 0" class="text-center text-slate-600 mt-20 font-mono text-xs uppercase tracking-widest">
                    Comms Matrix Empty
                </div>
            </div>

            <!-- CHAT INPUT -->
            <div class="bg-black/80 backdrop-blur border-t border-white/10 p-4">
                <div class="flex flex-col gap-2">
                    <label class="flex items-center space-x-2 cursor-pointer self-end text-xs text-slate-500 hover:text-red-400 transition-colors mr-1">
                        <input type="checkbox" v-model="isUrgent" class="accent-red-600 w-3 h-3">
                        <span class="uppercase tracking-wider">Flag Priority</span>
                    </label>
                    <div class="flex space-x-3">
                        <input type="text" v-model="draftMessage" @keyup.enter="sendMessage"
                               placeholder="Broadcast to all endpoints..." 
                               class="flex-1 bg-[#111] border border-white/10 rounded px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors font-mono">
                        <button @click="sendMessage" 
                                :class="isUrgent ? 'bg-red-700 hover:bg-red-600 text-white' : 'bg-slate-200 hover:bg-white text-black'"
                                class="font-black px-6 py-3 rounded uppercase tracking-widest text-sm transition-all active:scale-95">
                            Send
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyDuNNjKq8RLsjTJ8qhrvTe197V8KiOPdiU",
            authDomain: "daveco-messaging-service.firebaseapp.com",
            databaseURL: "https://daveco-messaging-service-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "daveco-messaging-service",
            storageBucket: "daveco-messaging-service.firebasestorage.app",
            messagingSenderId: "1061915230686",
            appId: "1:1061915230686:web:d2610247ac222b4c4cdd4f",
            measurementId: "G-HX16HEY6D5"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const { createApp, ref, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const adminName = 'MASTER CONTROL';
                
                // Config State
                const config = ref({ terminals: {}, force_flash: false, breathe_red: false, master_signal: 'clear' });
                
                // Chat State
                const draftMessage = ref('');
                const isUrgent = ref(false);
                const messages = ref([]);
                let initialLoad = true;

                const scrollToBottom = () => {
                    nextTick(() => {
                        const container = document.getElementById('chatContainer');
                        if (container) container.scrollTop = container.scrollHeight;
                    });
                };

                onMounted(() => {
                    // Sync Config
                    db.ref('daveco_config').on('value', snap => {
                        if (snap.val()) {
                            config.value = { ...config.value, ...snap.val() };
                            if (!config.value.terminals) config.value.terminals = {};
                        }
                    });

                    // Sync Chat
                    db.ref('messages').on('value', snap => {
                        const data = snap.val();
                        if (data) {
                            messages.value = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);
                            initialLoad = false;
                            scrollToBottom();
                        } else {
                            messages.value = [];
                        }
                    });
                });

                // Config Methods
                const updateConfig = () => db.ref('daveco_config').set(config.value);

                const addTerminal = () => {
                    const currentIds = Object.keys(config.value.terminals).map(Number);
                    const nextId = currentIds.length > 0 ? Math.max(...currentIds) + 1 : 1;
                    config.value.terminals[nextId] = `Terminal ${nextId}`;
                    updateConfig();
                };

                const removeTerminal = (id) => {
                    delete config.value.terminals[id];
                    updateConfig();
                };

                const setMasterSignal = (signal) => {
                    config.value.master_signal = signal;
                    updateConfig();
                };

                // Chat Methods
                const sendMessage = () => {
                    if (!draftMessage.value.trim()) return;
                    db.ref('messages').push({
                        sender: adminName,
                        text: draftMessage.value,
                        timestamp: Date.now(),
                        urgent: isUrgent.value
                    });
                    draftMessage.value = '';
                    isUrgent.value = false;
                };

                const clearMessages = () => {
                    if(confirm("Wipe the entire site-wide comms matrix? This cannot be undone.")) {
                        db.ref('messages').remove();
                    }
                };

                return { config, adminName, updateConfig, addTerminal, removeTerminal, setMasterSignal, draftMessage, isUrgent, messages, sendMessage, clearMessages }
            }
        }).mount('#app')
    </script>
</body>
</html>
