<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignalCo Endpoint</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --brand-bg: #000000;
            --brand-panel: #0b0b0b;
            --brand-raised: #1a1a1a;
            --line-strong: rgba(255, 255, 255, 0.1);
            --marker: #8b55d6;
        }
        
        body { background-color: var(--brand-bg); color: #e2e8f0; }

        /* Master Signals */
        .signal-standby { background-color: #1a1400 !important; box-shadow: inset 0 0 100px rgba(234, 179, 8, 0.2); border: 1px solid #eab308; }
        .signal-go { background-color: #021a0c !important; box-shadow: inset 0 0 150px rgba(16, 185, 129, 0.3); border: 1px solid #10b981; }
        
        /* Breathing Red */
        @keyframes breathe-red {
            0%, 100% { background-color: var(--brand-bg); box-shadow: inset 0 0 0px rgba(220, 38, 38, 0); }
            50% { background-color: #1a0509; box-shadow: inset 0 0 150px rgba(220, 38, 38, 0.4); }
        }
        .breathe-active { animation: breathe-red 5s ease-in-out infinite; }

        .message-urgent {
            background-color: rgba(153, 27, 27, 0.2) !important; 
            border-color: rgba(239, 68, 68, 0.5) !important;
            color: #fca5a5 !important; 
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body id="app" 
      :class="{
          'breathe-active': isBreathing && masterSignal === 'clear',
          'signal-standby': masterSignal === 'standby',
          'signal-go': masterSignal === 'go'
      }" 
      class="h-screen flex flex-col font-sans overflow-hidden transition-all duration-300">
    
<!-- FREE TIER WATERMARK OVERLAY -->
    <!-- Watermark is now securely tied to the database tier state -->
    <div v-if="tier !== 'pro'" class="fixed inset-0 pointer-events-none z-[9999] overflow-hidden flex items-center justify-center opacity-[0.03]">
        <div class="transform -rotate-45 text-[10vw] font-black tracking-widest text-white whitespace-nowrap select-none">
            SIGNALCO LITE
        </div>
    </div>
    
    <div v-if="tier !== 'pro'" class="fixed bottom-2 right-4 pointer-events-none z-[9999] opacity-30">
        <span class="text-[9px] font-mono tracking-widest text-white uppercase border border-white/20 px-2 py-1 rounded bg-black">
            Unlicensed Endpoint
        </span>
    </div>
    
    <!-- HEADER -->
    <header class="border-b px-8 py-4 flex justify-between items-center z-10 shadow-lg" style="background-color: var(--brand-panel); border-color: var(--line-strong);">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black tracking-widest uppercase" style="color: var(--marker);">
                {{ myName }}
            </h1>
        </div>
        
        <div class="flex items-center space-x-6">
            <!-- Visual Signal Indicator -->
            <div v-if="masterSignal === 'standby'" class="px-4 py-1 rounded bg-yellow-500/20 text-yellow-400 border border-yellow-500 font-bold animate-pulse tracking-widest">STANDBY</div>
            <div v-if="masterSignal === 'go'" class="px-4 py-1 rounded bg-emerald-500/20 text-emerald-400 border border-emerald-500 font-bold tracking-widest">SHOW GO</div>
            
            <div class="flex items-center space-x-3 text-xs font-mono text-slate-500 bg-black px-4 py-2 rounded border border-white/10">
                <span>ID: T-{{ terminalId }}</span>
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_10px_#10b981]"></div>
            </div>
        </div>
    </header>

    <!-- STREAMING PINNED OVERLAY BANNER -->
    <div v-if="pinnedMessage" class="bg-purple-950/40 border-b border-purple-500/50 text-purple-200 font-mono text-center p-3 text-sm font-bold tracking-wide shadow-md flex justify-center items-center gap-2 z-20">
        <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        <span>📌 PINNED: {{ pinnedMessage }}</span>
    </div>

    <!-- CHAT FEED -->
    <main class="flex-1 overflow-y-auto p-6 space-y-4 relative z-10" style="background-color: #050505;" id="chatContainer">
        <div class="max-w-4xl mx-auto space-y-4">
            <div v-for="msg in messages" :key="msg.id" class="flex flex-col max-w-[85%]" :class="msg.sender === myName ? 'ml-auto items-end' : 'items-start'">
                
                <div class="flex items-center gap-2 mb-1" :class="msg.sender === myName ? 'flex-row-reverse' : ''">
                    <span class="text-[10px] font-mono tracking-wider" :class="msg.sender === myName ? 'text-blue-400' : (msg.sender === 'MASTER CONTROL' ? 'text-purple-400 font-bold' : 'text-slate-500')">{{ msg.sender }}</span>
                    <span v-if="msg.urgent" class="text-[9px] uppercase font-black tracking-widest text-red-500 bg-red-950/50 px-1.5 py-0.5 rounded border border-red-900">Priority</span>
                </div>
                
                <div class="p-3 rounded-lg text-sm border shadow-sm"
                     :class="[
                         msg.urgent ? 'message-urgent' : 
                         (msg.sender === myName ? 'bg-blue-900/20 border-blue-800 text-blue-100 rounded-tr-none' : 'bg-[#111] border-white/10 text-slate-300 rounded-tl-none')
                     ]">
                    {{ msg.text }}
                </div>
            </div>
            
            <div v-if="messages.length === 0" class="text-center text-slate-600 mt-20 font-mono text-xs uppercase tracking-widest">
                Awaiting incoming transmissions...
            </div>
        </div>
    </main>

    <!-- CHAT INPUT -->
    <footer class="backdrop-blur border-t p-4 z-10 relative" style="background-color: rgba(0,0,0,0.8); border-color: var(--line-strong);">
        <div class="max-w-4xl mx-auto flex flex-col gap-2">
            <label class="flex items-center space-x-2 cursor-pointer self-end text-xs text-slate-500 hover:text-red-400 transition-colors mr-1" :class="{'opacity-40 cursor-not-allowed': isLocked}">
                <input type="checkbox" v-model="isUrgent" :disabled="isLocked" class="accent-red-600 w-3 h-3 disabled:cursor-not-allowed">
                <span class="uppercase tracking-wider">Flag Priority</span>
            </label>
            <div class="flex space-x-3">
                <input type="text" v-model="draftMessage" @keyup.enter="sendMessage" :disabled="isLocked"
                       :placeholder="isLocked ? 'TRANSMISSIONS PAUSED BY MASTER CONTROL...' : 'Broadcast to all endpoints...'" 
                       class="flex-1 bg-[#111] border border-white/10 rounded px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors font-mono disabled:opacity-40 disabled:cursor-not-allowed">
                <button @click="sendMessage" :disabled="isLocked"
                        :class="isLocked ? 'bg-slate-800 border border-slate-700 text-slate-500 cursor-not-allowed' : (isUrgent ? 'bg-red-700 hover:bg-red-600 text-white' : 'bg-slate-200 hover:bg-white text-black')"
                        class="font-black px-6 py-3 rounded uppercase tracking-widest text-sm transition-all active:scale-95 disabled:grayscale">
                    SEND
                </button>
            </div>
        </div>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk7ynP52uYc29OL1Swl64tt0aTOTHaE9Y",
            authDomain: "signalco-94890.firebaseapp.com",
            databaseURL: "https://signalco-94890-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "signalco-94890",
            storageBucket: "signalco-94890.firebasestorage.app",
            messagingSenderId: "957105280763",
            appId: "1:957105280763:web:7df0b037c3c51f32ae025e",
            measurementId: "G-WSXF0KGPZ2"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const firestore = firebase.firestore();

        const { createApp, ref, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                // SaaS Routing: Grab Event UUID and Terminal ID
                const urlParams = new URLSearchParams(window.location.search);
                const eventId = ref(urlParams.get('event') || 'demo_sandbox');
                const terminalId = ref(urlParams.get('t') || '0');
                const tier = ref('free'); // Secure default
                
                // Database Paths based on Event UUID
                const statusPath = `events/${eventId.value}/status`;
                const configPath = `events/${eventId.value}/config`;
                const messagesPath = `events/${eventId.value}/messages`;
                
                const myName = ref('Connecting...');
                const isBreathing = ref(false);
                const masterSignal = ref('clear');
                const isLocked = ref(false);
                const pinnedMessage = ref('');
                
                const draftMessage = ref('');
                const isUrgent = ref(false);
                const messages = ref([]);
                
                let initialLoad = true;
                let currentRtdbStatus = 'free';
                const masterIsPremium = ref(false);

                const evaluateTier = () => {
                    if (currentRtdbStatus === 'pro' || currentRtdbStatus === 'paid' || masterIsPremium.value === true) {
                        tier.value = 'pro';
                    } else {
                        tier.value = 'free';
                    }
                };

                const scrollToBottom = () => {
                    nextTick(() => {
                        const container = document.getElementById('chatContainer');
                        if (container) container.scrollTop = container.scrollHeight;
                    });
                };

                onMounted(() => {
                    // 1. MASTER SUBSCRIPTION CHECK (Firestore)
                    auth.onAuthStateChanged(async (user) => {
                        if (user) {
                            try {
                                const userDoc = await firestore.collection('users').doc(user.uid).get();
                                if (userDoc.exists && userDoc.data().status === 'premium') {
                                    masterIsPremium.value = true;
                                } else {
                                    masterIsPremium.value = false;
                                }
                            } catch (err) {
                                console.error("Firestore verification failed: ", err);
                            }
                        } else {
                            masterIsPremium.value = false;
                        }
                        evaluateTier();
                    });

                    // 2. LIVE STATUS LISTENER (Realtime Database)
                    db.ref(statusPath).on('value', snap => {
                        currentRtdbStatus = snap.val();
                        evaluateTier();
                    });

                    // Config Listener
                    db.ref(configPath).on('value', snap => {
                        const data = snap.val();
                        if (data) {
                            if (data.terminals && data.terminals[terminalId.value]) {
                                myName.value = data.terminals[terminalId.value];
                            } else {
                                myName.value = `Unassigned Terminal (${terminalId.value})`;
                            }
                            
                            isBreathing.value = data.breathe_red || false;
                            masterSignal.value = data.master_signal || 'clear';
                            isLocked.value = data.chat_locked || false;
                            pinnedMessage.value = data.pinned_message || '';
                        }
                    });

                    // Messages Listener
                    db.ref(messagesPath).on('value', snap => {
                        const data = snap.val();
                        if (data) {
                            const msgArray = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);
                            messages.value = msgArray;
                            
                            if (!initialLoad) {
                                const newestMsg = msgArray[msgArray.length - 1];
                                if (newestMsg.urgent && newestMsg.sender !== myName.value) {
                                    if (navigator.vibrate) navigator.vibrate([200]); 
                                }
                            }
                            initialLoad = false;
                            scrollToBottom();
                        } else {
                            messages.value = [];
                        }
                    });
                });

                const sendMessage = () => {
                    if (!draftMessage.value.trim() || isLocked.value) return;
                    
                    db.ref(messagesPath).push({
                        sender: myName.value,
                        text: draftMessage.value,
                        timestamp: Date.now(),
                        urgent: isUrgent.value
                    });
                    
                    draftMessage.value = '';
                    isUrgent.value = false;
                };

                return { eventId, terminalId, tier, myName, isBreathing, masterSignal, draftMessage, isUrgent, messages, sendMessage, isLocked, pinnedMessage }
            }
        }).mount('#app')
    </script>
</body>
</html>
