<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignalCo Endpoint</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <style>
        /* Site Evacuation Strobe */
        @keyframes strobe {
            0%, 49% { background-color: #ef4444; color: white; }
            50%, 100% { background-color: #000000; color: #ef4444; }
        }
        .flash-active { animation: strobe 0.5s infinite; border: 10px solid #ef4444; }
        
        /* Master Signals */
        .signal-standby { background-color: #1a1400 !important; box-shadow: inset 0 0 100px rgba(234, 179, 8, 0.2); border: 2px solid #eab308; }
        .signal-go { background-color: #021a0c !important; box-shadow: inset 0 0 150px rgba(16, 185, 129, 0.3); border: 2px solid #10b981; }
        
        /* Breathing Red */
        @keyframes breathe-red {
            0%, 100% { background-color: #020617; box-shadow: inset 0 0 0px rgba(220, 38, 38, 0); }
            50% { background-color: #1a0509; box-shadow: inset 0 0 150px rgba(220, 38, 38, 0.4); }
        }
        .breathe-active { animation: breathe-red 5s ease-in-out infinite; }

        .message-urgent {
            background-color: rgba(153, 27, 27, 0.8) !important; 
            color: #fca5a5 !important; 
            border-color: #ef4444 !important;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body id="app" 
      :class="{
          'flash-active': isFlashing, 
          'breathe-active': isBreathing && !isFlashing && masterSignal === 'clear',
          'signal-standby': masterSignal === 'standby' && !isFlashing,
          'signal-go': masterSignal === 'go' && !isFlashing
      }" 
      class="bg-slate-950 h-screen flex flex-col transition-all duration-300">

    <header class="bg-slate-900/80 backdrop-blur-sm border-b border-slate-800 p-6 shadow-md z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <span class="text-xs text-slate-500 uppercase tracking-widest font-bold">Endpoint Designation</span>
                <h1 class="text-2xl font-black text-blue-400 uppercase tracking-wide">{{ myName }}</h1>
            </div>
            
            <div class="flex items-center space-x-6">
                <!-- Visual Signal Indicator -->
                <div v-if="masterSignal === 'standby'" class="px-4 py-1 rounded bg-yellow-500/20 text-yellow-400 border border-yellow-500 font-bold animate-pulse">STANDBY</div>
                <div v-if="masterSignal === 'go'" class="px-4 py-1 rounded bg-emerald-500/20 text-emerald-400 border border-emerald-500 font-bold">SHOW GO</div>
                <div v-if="isFlashing" class="px-4 py-1 rounded bg-red-500 text-white font-black text-xl tracking-widest uppercase">EVACUATE</div>
                
                <div class="flex items-center space-x-3">
                    <span class="text-slate-400 text-sm font-mono">ID: T-{{ terminalId }}</span>
                    <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_10px_#10b981]"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6 relative z-10" id="chatContainer">
        <div class="max-w-4xl mx-auto space-y-4">
            <div v-for="msg in messages" :key="msg.id" 
                 class="p-4 rounded-xl max-w-[80%] shadow-md transition-all"
                 :class="[
                     msg.sender === myName ? 'ml-auto' : '',
                     msg.urgent ? 'message-urgent' : (msg.sender === myName ? 'bg-blue-600/20 border border-blue-500/30 text-blue-100' : 'bg-slate-800 border border-slate-700 text-slate-200')
                 ]">
                <div class="flex items-center justify-between mb-1">
                    <span class="text-xs opacity-50 font-bold tracking-wide">{{ msg.sender }}</span>
                    <span v-if="msg.urgent" class="text-[10px] uppercase font-black tracking-widest opacity-80 text-red-300 flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        Priority
                    </span>
                </div>
                <p class="text-lg">{{ msg.text }}</p>
            </div>
            <div v-if="messages.length === 0" class="text-center text-slate-600 mt-20 font-mono">
                Awaiting incoming transmissions...
            </div>
        </div>
    </main>

    <footer class="bg-slate-900/90 backdrop-blur-sm border-t border-slate-800 p-6 z-10 relative">
        <div class="max-w-4xl mx-auto flex flex-col space-y-4">
            <label class="flex items-center space-x-2 cursor-pointer self-end text-sm text-slate-400 hover:text-red-400 transition-colors">
                <input type="checkbox" v-model="isUrgent" class="accent-red-600 w-4 h-4">
                <span>Flag as Priority</span>
            </label>
            <div class="flex space-x-4">
                <input type="text" v-model="draftMessage" @keyup.enter="sendMessage" :disabled="isFlashing"
                       placeholder="Type transmission..." 
                       class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-6 py-4 text-slate-200 focus:outline-none focus:border-blue-500 transition-colors focus:ring-1 focus:ring-blue-500 shadow-inner disabled:opacity-50">
                <button @click="sendMessage" :disabled="isFlashing"
                        :class="isUrgent ? 'bg-red-700 hover:bg-red-600 shadow-[0_0_15px_rgba(220,38,38,0.4)]' : 'bg-blue-600 hover:bg-blue-500 shadow-[0_0_15px_rgba(37,99,235,0.3)]'"
                        class="text-white font-bold px-8 py-4 rounded-xl transition-all active:scale-95 disabled:opacity-50 disabled:grayscale">
                    SEND
                </button>
            </div>
        </div>
    </footer>

    <script>
const firebaseConfig = {
  apiKey: "AIzaSyDk7ynP52uYc29OL1Swl64tt0aTOTHaE9Y",
  authDomain: "signalco-94890.firebaseapp.com",
  databaseURL: "https://signalco-94890-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "signalco-94890",
  storageBucket: "signalco-94890.firebasestorage.app",
  messagingSenderId: "957105280763",
  appId: "1:957105280763:web:7df0b037c3c51f32ae025e",
  measurementId: "G-WSXF0KGPZ2"
};
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const { createApp, ref, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const urlParams = new URLSearchParams(window.location.search);
                const terminalId = ref(urlParams.get('t') || '1');
                
                const myName = ref('Connecting...');
                const isFlashing = ref(false);
                const isBreathing = ref(false);
                const masterSignal = ref('clear');
                const draftMessage = ref('');
                const isUrgent = ref(false);
                const messages = ref([]);
                
                let initialLoad = true;

                const scrollToBottom = () => {
                    nextTick(() => {
                        const container = document.getElementById('chatContainer');
                        if (container) container.scrollTop = container.scrollHeight;
                    });
                };

                onMounted(() => {
                    db.ref('daveco_config').on('value', snap => {
                        const data = snap.val();
                        if (data) {
                            // Safely pull from the new dynamic terminals dictionary
                            if (data.terminals && data.terminals[terminalId.value]) {
                                myName.value = data.terminals[terminalId.value];
                            } else {
                                myName.value = `Unassigned Terminal (${terminalId.value})`;
                            }
                            
                            isFlashing.value = data.force_flash;
                            isBreathing.value = data.breathe_red;
                            masterSignal.value = data.master_signal || 'clear';
                        }
                    });

                    db.ref('messages').on('value', snap => {
                        const data = snap.val();
                        if (data) {
                            const msgArray = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);
                            messages.value = msgArray;
                            
                            if (!initialLoad) {
                                const newestMsg = msgArray[msgArray.length - 1];
                                if (newestMsg.urgent && newestMsg.sender !== myName.value) {
                                    if (navigator.vibrate) navigator.vibrate([200]); 
                                }
                            }
                            initialLoad = false;
                            scrollToBottom();
                        } else {
                            messages.value = [];
                        }
                    });
                });

                const sendMessage = () => {
                    if (!draftMessage.value.trim() || isFlashing.value) return;
                    
                    db.ref('messages').push({
                        sender: myName.value,
                        text: draftMessage.value,
                        timestamp: Date.now(),
                        urgent: isUrgent.value
                    });
                    
                    draftMessage.value = '';
                    isUrgent.value = false;
                };

                return { terminalId, myName, isFlashing, isBreathing, masterSignal, draftMessage, isUrgent, messages, sendMessage }
            }
        }).mount('#app')
    </script>
</body>
</html>
